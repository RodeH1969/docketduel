<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>PRICEDUX</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0d;
      --bg2: #15151b;
      --panel-border: rgba(255,255,255,0.10);
      --text: #f5f7fb;
      --muted: #bfc5d2;
      --gold1: #ffe066;
      --gold2: #ffb703;
      --gold3: #ff8c00;
      --green: #34d17b;
      --red: #ff5c74;
      --shadow: 0 20px 50px rgba(0,0,0,.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,185,0,.10), transparent 30%),
        radial-gradient(circle at bottom, rgba(77,123,255,.10), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg));
    }

    img { display: block; max-width: 100%; height: auto; }
    button { font: inherit; border: 0; cursor: pointer; }

    .app {
      width: min(100%, 460px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen { display: none; width: 100%; }
    .screen.active { display: block; }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-xl);
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .pill, .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      font-size: .84rem;
      font-weight: 800;
      color: #fff;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .sub {
      text-align: center;
      color: #ffffff;
      line-height: 1.2;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: .01em;
      max-width: 20ch;
      margin: 20px auto 0;
    }

    .splash-logo {
      width: min(100%, 330px);
      margin: 0 auto 18px;
      border-radius: 24px;
      box-shadow: 0 18px 48px rgba(0,0,0,.45);
    }

    .splash-sub {
      text-align: center;
      color: var(--muted);
      margin-top: 8px;
      font-size: 1.08rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .reveal-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .battle-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }

    .vs-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2px 0;
    }

    .vs-image {
      width: 110px;
      height: 110px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    }

    .logo-triangle {
      position: relative;
      width: 100%;
      height: 340px;
      margin-top: 20px;
    }

    .triangle-center {
      position: absolute;
      top: 48%;
      left: 50%;
      width: 92px;
      height: 92px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }

    .triangle-center img {
      width: 86px;
      height: 86px;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.28));
    }

    .triangle-logo {
      position: absolute;
      width: 126px;
      min-height: 126px;
      padding: 14px;
      border-radius: 24px;
      background: #f4f4f5;
      color: #141414;
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .triangle-logo img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      background: #ffffff;
      border-radius: 16px;
      padding: 10px;
    }

    .triangle-name {
      margin-top: 10px;
      font-size: .95rem;
      font-weight: 900;
      line-height: 1;
    }

    .aldi-node {
      top: 0;
      left: 8px;
    }

    .coles-node {
      top: 0;
      right: 8px;
    }

    .woolworths-node {
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
    }

    .card {
      background: #f4f4f5;
      color: #141414;
      border-radius: 26px;
      padding: 12px;
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease, filter .18s ease;
      box-shadow: 0 12px 30px rgba(0,0,0,.18);
    }

    .card img.product-image {
      width: 100%;
      height: 180px;
      object-fit: contain;
      background: #ffffff;
      border-radius: 18px;
      padding: 10px;
    }

    .name {
      margin-top: 10px;
      font-size: .97rem;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: -.01em;
    }

    .store {
      margin-top: 6px;
      font-size: .82rem;
      color: #5a5f69;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .hint {
      margin-top: 10px;
      font-size: .98rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .02em;
      text-align: center;
    }

    .battle-hint {
      color: #d1002a;
    }

    .pick {
      appearance: none;
      background: transparent;
      padding: 0;
      width: 100%;
      color: inherit;
    }

    .pick:active { transform: scale(.985); }

    .cta, .secondary {
      width: 100%;
      min-height: 58px;
      margin-top: 16px;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: -.01em;
    }

    .cta {
      color: #141414;
      background: linear-gradient(135deg, var(--gold1), var(--gold2) 60%, var(--gold3));
      box-shadow: 0 12px 28px rgba(255,183,3,.30), inset 0 1px 0 rgba(255,255,255,.35);
    }

    .secondary {
      color: var(--text);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
    }

    .message {
      margin-top: 14px;
      text-align: center;
      font-weight: 900;
      font-size: 1rem;
      line-height: 1.35;
    }

    .good { color: var(--green); }
    .bad  { color: var(--red); }

    .selected { outline: 4px solid rgba(255,183,3,.85); }

    .cheapest {
      outline: 4px solid rgba(52,209,123,.95);
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 42px rgba(52,209,123,.35);
    }

    .wrong {
      outline: 4px solid rgba(255,92,116,.95);
      opacity: .70;
      filter: grayscale(.15);
    }

    .price-row {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .price {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 1.8rem;
      line-height: 1;
      font-weight: 900;
    }

    .price-cheap {
      color: #ffffff;
      background: #d1002a;
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.35),
        0 0 0 2px rgba(255, 255, 255, 0.15);
      transform: rotate(-1deg);
    }

    .price-expensive {
      color: #121212;
      background: radial-gradient(circle at top, #fff3a6 0%, #ffd84d 35%, #ffb703 70%, #ff8c00 100%);
      box-shadow:
        0 12px 28px rgba(255,183,3,.30),
        inset 0 2px 0 rgba(255,255,255,.45),
        inset 0 -2px 0 rgba(0,0,0,.10);
      transform: rotate(1deg);
    }

    .result-icon {
      width: 102px;
      height: 102px;
      object-fit: contain;
      display: none;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
      padding: 0 !important;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.22));
    }

    .result-icon.show {
      display: block;
    }

    .share-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      white-space: pre-wrap;
    }

    @media (max-width: 390px) {
      .card img.product-image { height: 160px; }
      .price { font-size: 1.55rem; min-height: 50px; }
      .vs-image { width: 90px; height: 90px; }

      .logo-triangle {
        height: 305px;
      }

      .triangle-logo {
        width: 112px;
        min-height: 112px;
        padding: 12px;
      }

      .triangle-logo img {
        width: 74px;
        height: 74px;
      }

      .triangle-center {
        width: 78px;
        height: 78px;
        top: 47%;
      }

      .triangle-center img {
        width: 72px;
        height: 72px;
      }

      .sub {
        font-size: 1.2rem;
        max-width: 18ch;
      }

      .result-icon {
        width: 84px;
        height: 84px;
      }
    }
  </style>
</head>
<body>
<main class="app">

  <section class="screen active" id="splash-screen">
    <div class="panel">
      <img src="./docketduel.png" alt="PRICEDUX" class="splash-logo" onerror="this.style.display='none'">
      <p class="splash-sub">TEST YOUR PRICE IQ</p>
      <button class="cta" id="splash-play-btn" type="button">Play</button>
    </div>
  </section>

  <section class="screen" id="start-screen">
    <div class="panel">
      <div class="pill">20 Rounds</div>
      <p class="sub">20 Rounds. 26 Products.</p>

      <div class="logo-triangle">
        <div class="triangle-logo aldi-node">
          <img src="./aldi.png" alt="Aldi logo">
          <div class="triangle-name">Aldi</div>
        </div>

        <div class="triangle-logo coles-node">
          <img src="./coles.png" alt="Coles logo">
          <div class="triangle-name">Coles</div>
        </div>

        <div class="triangle-center">
          <img src="./vs.png" alt="Versus">
        </div>

        <div class="triangle-logo woolworths-node">
          <img src="./woolworths.png" alt="Woolworths logo">
          <div class="triangle-name">Woolworths</div>
        </div>
      </div>

      <button class="cta" id="play-btn" type="button">Play</button>
    </div>
  </section>

  <section class="screen" id="battle-screen">
    <div class="panel">
      <div class="top">
        <div class="chip" id="round-chip">Round 1</div>
        <div class="chip" id="survived-chip">Survived 0</div>
      </div>

      <div class="battle-stack">
        <button class="pick" id="pick-top" type="button">
          <div class="card" id="battle-top-card">
            <img class="product-image" id="battle-top-img" src="" alt="">
            <div class="name" id="battle-top-name"></div>
            <div class="hint battle-hint">TAP the cheaper product</div>
          </div>
        </button>

        <div class="vs-wrap">
          <img src="./vs.png" alt="Versus" class="vs-image">
        </div>

        <button class="pick" id="pick-bottom" type="button">
          <div class="card" id="battle-bottom-card">
            <img class="product-image" id="battle-bottom-img" src="" alt="">
            <div class="name" id="battle-bottom-name"></div>
            <div class="hint battle-hint">TAP the cheaper product</div>
          </div>
        </button>
      </div>
    </div>
  </section>

  <section class="screen" id="reveal-screen">
    <div class="panel">
      <div class="top">
        <div class="chip" id="reveal-round-chip">Round 1</div>
        <div class="chip" id="reveal-state-chip">Result</div>
      </div>

      <div class="reveal-grid">
        <div class="card" id="reveal-top-card">
          <img class="product-image" id="reveal-top-img" src="" alt="">
          <div class="name" id="reveal-top-name"></div>
          <div class="store" id="reveal-top-store"></div>
          <div class="price-row">
            <div class="price" id="reveal-top-price"></div>
            <img src="./tick.png" alt="Result" class="result-icon" id="reveal-top-icon" onerror="this.style.display='none'; this.title='Missing tick/cross file';">
          </div>
        </div>

        <div class="vs-wrap">
          <img src="./vs.png" alt="Versus" class="vs-image">
        </div>

        <div class="card" id="reveal-bottom-card">
          <img class="product-image" id="reveal-bottom-img" src="" alt="">
          <div class="name" id="reveal-bottom-name"></div>
          <div class="store" id="reveal-bottom-store"></div>
          <div class="price-row">
            <div class="price" id="reveal-bottom-price"></div>
            <img src="./tick.png" alt="Result" class="result-icon" id="reveal-bottom-icon" onerror="this.style.display='none'; this.title='Missing tick/cross file';">
          </div>
        </div>
      </div>

      <div class="message" id="reveal-message"></div>
      <button class="cta" id="continue-btn" type="button">Continue</button>
    </div>
  </section>

  <section class="screen" id="share-screen">
    <div class="panel">
      <div class="pill">Daily result</div>
      <div style="font-family:'Archivo Black',sans-serif;font-size:1.9rem;margin-top:12px;text-transform:uppercase">
        PRICEDUX
      </div>

      <div class="share-box">
        <div id="share-text" style="font-size:1.05rem;line-height:1.45;font-weight:800;"></div>
      </div>

      <button class="cta" id="share-btn" type="button">Share result</button>
      <button class="secondary" id="restart-btn" type="button">Play again</button>
    </div>
  </section>

</main>

<script>
  const TICK_SRC = './tick.png';
  const CROSS_SRC = './cross.png';
  const SHARE_URL = 'https://docketduel.onrender.com';
  const TOTAL_ROUNDS = 20;

  const products = [
    { name: 'La Gina Extra Virgin Olive Oil 1L', store: 'Woolworths', price: 26.00, image: './products/La Gina Extra Virgin Olive Oil 1L.png' },
    { name: 'Trimat Advanced Laundry Powder 5kg', store: 'Aldi', price: 24.99, image: './products/Trimat Advanced Laundry Powder 5kg.png' },
    { name: 'Fresh Tasmanian Salmon Fillets Skin On 4 Pack 460g', store: 'Aldi', price: 15.99, image: './products/Fishmonger Tasmanian Salmon Fillets Skin On 4 Pack 460g.png' },
    { name: 'Raid Max Pest Multi Insect Killer Spring Meadow 300g', store: 'Coles', price: 13.00, image: './products/Raid Max Pest Multi Insect Killer Spring Meadow 300g.png' },
    { name: 'Byron Bay Chilli Co. Jalapeno Sauce 250g', store: 'Woolworths', price: 5.00, image: './products/Byron Bay Chilli Co. Jalapeno Sauce 250g.png' },
    { name: 'Libra Super Tampons 32 pack', store: 'Coles', price: 9.00, image: './products/Libra Super Tampons 32 pack.png' },
    { name: 'Duracell Coppertop AA Alkaline Batteries 16 Pack', store: 'Coles', price: 28.00, image: './products/Duracell Coppertop AA Alkaline Batteries 16 Pack.png' },
    { name: 'Vegemite 560g', store: 'Woolworths', price: 9.90, image: './products/Vegemite-560g.png' },
    { name: 'Urban Eats Pork Dumplings 750g', store: 'Aldi', price: 8.99, image: './products/Urban-eats-pork-dumplings-750g.png' },
    { name: 'Grand Padano 250g', store: 'Aldi', price: 8.29, image: './products/Grand-padano-250g.png' },
    { name: 'A2 Full Cream Milk 2L', store: 'Coles', price: 6.90, image: './products/a2-full-cream-milk-2l.png' },
    { name: 'Red Rock Deli Potato Chips 165g', store: 'Woolworths', price: 6.00, image: './products/Red-rock-deli-potato-chips-165g.png' },
    { name: 'Choco Pillows 500g', store: 'Aldi', price: 4.69, image: './products/Choco-pillows-500g.png' },
    { name: 'Cadbury Chomp bar 30g', store: 'Coles', price: 1.00, image: './products/Cadbury-chomp-bar-30g.png' },
    { name: 'Hydale Beef Jerky Original 50g', store: 'Aldi', price: 3.99, image: './products/Hydale Beef Jerky Original 50g.png' },
    { name: 'Nivea Deo Aero Female Pearl And Beauty 250mL', store: 'Coles', price: 10.50, image: './products/Nivea Deo Aero Female Pearl And Beauty 250mL.png' },
    { name: 'Nescafe Gold Original Soluble Instant Coffee Jar 100g', store: 'Woolworths', price: 14.50, image: './products/Nescafe Gold Original Soluble Instant Coffee Jar 100g.png' },
    { name: 'Durex Original Regular Fit Condoms 30 pack', store: 'Woolworths', price: 17.50, image: './products/Durex Original Regular Fit Condoms 30 pack.png' },
    { name: 'Peters Maxibon Original Vanilla 4 Pack 560mL', store: 'Coles', price: 11.50, image: './products/Peters Maxibon Original Vanilla 4 Pack 560mL.png' },
    { name: 'Old El Paso Quesadilla Kit 365g', store: 'Coles', price: 8.50, image: './products/Old El Paso Quesadilla Kit 365g.png' },
    { name: 'Westacre Dairy Cottage Cheese 500g', store: 'Aldi', price: 5.49, image: './products/Westacre Dairy Cottage Cheese 500g.png' },
    { name: 'International Cuisine Beef Lasagne 2kg', store: 'Aldi', price: 11.49, image: './products/International Cuisine Beef Lasagne 2kg.png' },
    { name: 'Milfina Jelli Pop 6 Pack 450ml', store: 'Aldi', price: 4.99, image: './products/Milfina Jelli Pop 6 Pack 450ml.png' },
    { name: 'Specially Selected Calabrese Salami & Roasted Red Peppers Wood Fired Pizza 420g', store: 'Aldi', price: 7.99, image: './products/Specially Selected Calabrese Salami & Roasted Red Peppers Wood Fired Pizza 420g.png' },
    { name: 'Finish Ultimate Dishwashing Tablets 46 Pack', store: 'Aldi', price: 22.99, image: './products/Finish-Ultimate-46-Pack.png' },
    { name: 'El Tora Fajita Seasoning 40g', store: 'Aldi', price: 1.29, image: './products/El Tora Fajita Seasoning 40g.png' }
  ];

  const screens = {
    splash: document.getElementById('splash-screen'),
    start: document.getElementById('start-screen'),
    battle: document.getElementById('battle-screen'),
    reveal: document.getElementById('reveal-screen'),
    share: document.getElementById('share-screen')
  };

  let roundIndex = 0;
  let survived = 0;
  let selectedSide = '';
  let correct = false;
  let currentPair = null;
  let todaysRounds = [];

  function show(name) {
    Object.values(screens).forEach(screen => {
      if (screen) screen.classList.remove('active');
    });
    if (screens[name]) screens[name].classList.add('active');
  }

  function money(value) {
    return '$' + value.toFixed(2);
  }

  function setImg(el, src, alt) {
    if (!el) return;
    el.src = src;
    el.alt = alt;
    el.onerror = function () {
      this.style.border = '2px solid red';
      this.title = 'Missing file: ' + src;
    };
  }

  function setResultIcon(el, src, alt) {
    if (!el) return;
    el.src = src;
    el.alt = alt;
    el.classList.add('show');
    el.onerror = function () {
      this.style.display = 'none';
      this.title = 'Missing file: ' + src;
    };
  }

  function getDailySeedString() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function hashString(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^ (h >>> 16)) >>> 0;
  }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function seededShuffle(array, rand) {
    const a = array.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function buildTodaysRounds() {
    const seed = hashString(getDailySeedString());
    const rand = mulberry32(seed);

    const shuffled = seededShuffle(products, rand);
    const sortedByPrice = shuffled.slice().sort((a, b) => a.price - b.price);

    const basePairs = [];
    for (let i = 0; i < sortedByPrice.length - 1; i++) {
      basePairs.push([sortedByPrice[i], sortedByPrice[i + 1]]);
    }

    const pairShuffled = seededShuffle(basePairs, rand);
    const rounds = [];

    for (let i = 0; i < TOTAL_ROUNDS; i++) {
      const pair = pairShuffled[i % pairShuffled.length];
      const flip = rand() < 0.5;
      rounds.push({
        top: flip ? pair[0] : pair[1],
        bottom: flip ? pair[1] : pair[0]
      });
    }

    return rounds;
  }

  function renderBattle() {
    currentPair = todaysRounds[roundIndex];

    document.getElementById('round-chip').textContent = 'Round ' + (roundIndex + 1);
    document.getElementById('survived-chip').textContent = 'Survived ' + survived;

    document.getElementById('battle-top-card').className = 'card';
    document.getElementById('battle-bottom-card').className = 'card';

    document.getElementById('battle-top-name').textContent = currentPair.top.name;
    document.getElementById('battle-bottom-name').textContent = currentPair.bottom.name;

    setImg(document.getElementById('battle-top-img'), currentPair.top.image, currentPair.top.name);
    setImg(document.getElementById('battle-bottom-img'), currentPair.bottom.image, currentPair.bottom.name);
  }

  function renderReveal() {
    const cheap = currentPair.top.price <= currentPair.bottom.price ? 'top' : 'bottom';

    document.getElementById('reveal-round-chip').textContent = 'Round ' + (roundIndex + 1);
    document.getElementById('reveal-state-chip').textContent = correct ? 'Correct' : 'Incorrect';

    ['reveal-top-card', 'reveal-bottom-card'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.className = 'card';
    });

    const topPriceEl = document.getElementById('reveal-top-price');
    const bottomPriceEl = document.getElementById('reveal-bottom-price');
    const topIconEl = document.getElementById('reveal-top-icon');
    const bottomIconEl = document.getElementById('reveal-bottom-icon');

    topPriceEl.className = 'price';
    bottomPriceEl.className = 'price';
    topIconEl.className = 'result-icon';
    bottomIconEl.className = 'result-icon';

    if (selectedSide === 'top') document.getElementById('reveal-top-card').classList.add('selected');
    if (selectedSide === 'bottom') document.getElementById('reveal-bottom-card').classList.add('selected');

    if (cheap === 'top') {
      document.getElementById('reveal-top-card').classList.add('cheapest');
      topPriceEl.classList.add('price-cheap');
      bottomPriceEl.classList.add('price-expensive');
    } else {
      document.getElementById('reveal-bottom-card').classList.add('cheapest');
      bottomPriceEl.classList.add('price-cheap');
      topPriceEl.classList.add('price-expensive');
    }

    if (correct) {
      if (selectedSide === 'top') {
        setResultIcon(topIconEl, TICK_SRC, 'Correct');
      } else {
        setResultIcon(bottomIconEl, TICK_SRC, 'Correct');
      }
    } else {
      if (selectedSide === 'top') {
        document.getElementById('reveal-top-card').classList.add('wrong');
        setResultIcon(topIconEl, CROSS_SRC, 'Wrong');
      } else {
        document.getElementById('reveal-bottom-card').classList.add('wrong');
        setResultIcon(bottomIconEl, CROSS_SRC, 'Wrong');
      }
    }

    document.getElementById('reveal-top-name').textContent = currentPair.top.name;
    document.getElementById('reveal-top-store').textContent = currentPair.top.store;
    topPriceEl.textContent = money(currentPair.top.price);

    document.getElementById('reveal-bottom-name').textContent = currentPair.bottom.name;
    document.getElementById('reveal-bottom-store').textContent = currentPair.bottom.store;
    bottomPriceEl.textContent = money(currentPair.bottom.price);

    setImg(document.getElementById('reveal-top-img'), currentPair.top.image, currentPair.top.name);
    setImg(document.getElementById('reveal-bottom-img'), currentPair.bottom.image, currentPair.bottom.name);

    const messageEl = document.getElementById('reveal-message');
    messageEl.textContent = correct
      ? 'Correct. You survived this round.'
      : 'Bugger. You fluffed it. Play again tomorrow. Cmon, you know you want to! 😎';
    messageEl.className = 'message ' + (correct ? 'good' : 'bad');

    document.getElementById('continue-btn').textContent =
      correct && roundIndex < todaysRounds.length - 1 ? 'Go to round ' + (roundIndex + 2) : 'See result';
  }

  function buildShareText(roundsSurvived) {
    let squares = '';

    if (roundsSurvived <= 0) {
      squares = '🟥' + '⬛'.repeat(TOTAL_ROUNDS - 1);
    } else if (roundsSurvived >= TOTAL_ROUNDS) {
      squares = '🟩'.repeat(TOTAL_ROUNDS);
    } else {
      squares = '🟩'.repeat(roundsSurvived) + '🟥' + '⬛'.repeat(TOTAL_ROUNDS - roundsSurvived - 1);
    }

    const seedDate = getDailySeedString();
    const header = `${seedDate} · PRICEDUX · Rounds: ${squares}`;

    let joke = '';
    if (roundsSurvived >= 1 && roundsSurvived <= 5) {
      joke = "Hey buddy, nice try testing your price IQ. Don't beat yourself up about an early duck 🙂";
    } else if (roundsSurvived >= 6 && roundsSurvived <= 9) {
      joke = "Well, at least you had a crack. Come back soonish! 👍";
    } else if (roundsSurvived >= 10 && roundsSurvived <= 13) {
      joke = "You've got some price smarts. Good job! 🥊";
    } else if (roundsSurvived >= 14 && roundsSurvived <= 17) {
      joke = "You know your prices! Kudos bro! 😎";
    } else if (roundsSurvived >= 18 && roundsSurvived <= 20) {
      joke = "My god, you're the friggin Albert F Einstein of the supermarket! 👑";
    } else {
      joke = "Hey buddy, nice try testing your price IQ. Don't beat yourself up about an early duck 🙂";
    }

    return `${header}\n\n${joke}\n\nPlay PRICEDUX:\n${SHARE_URL}`;
  }

  function pick(side) {
    selectedSide = side;

    const chosen = side === 'top' ? currentPair.top : currentPair.bottom;
    const other = side === 'top' ? currentPair.bottom : currentPair.top;

    correct = chosen.price <= other.price;

    if (correct) survived += 1;

    renderReveal();
    show('reveal');
  }

  window.addEventListener('DOMContentLoaded', () => {
    todaysRounds = buildTodaysRounds();

    const splashPlayBtn = document.getElementById('splash-play-btn');
    const playBtn = document.getElementById('play-btn');
    const pickTop = document.getElementById('pick-top');
    const pickBottom = document.getElementById('pick-bottom');
    const continueBtn = document.getElementById('continue-btn');
    const restartBtn = document.getElementById('restart-btn');
    const shareBtn = document.getElementById('share-btn');

    if (splashPlayBtn) {
      splashPlayBtn.addEventListener('click', () => {
        show('start');
      });
    }

    if (playBtn) {
      playBtn.addEventListener('click', () => {
        todaysRounds = buildTodaysRounds();
        roundIndex = 0;
        survived = 0;
        selectedSide = '';
        correct = false;
        renderBattle();
        show('battle');
      });
    }

    if (pickTop) pickTop.addEventListener('click', () => pick('top'));
    if (pickBottom) pickBottom.addEventListener('click', () => pick('bottom'));

    if (continueBtn) {
      continueBtn.addEventListener('click', () => {
        if (!correct || roundIndex === todaysRounds.length - 1) {
          document.getElementById('share-text').textContent = buildShareText(survived);
          show('share');
          return;
        }

        roundIndex += 1;
        renderBattle();
        show('battle');
      });
    }

    if (restartBtn) {
      restartBtn.addEventListener('click', () => {
        show('splash');
      });
    }

    if (shareBtn) {
      shareBtn.addEventListener('click', async () => {
        const text = document.getElementById('share-text').textContent;

        if (navigator.share) {
          try {
            await navigator.share({ title: 'PRICEDUX', text, url: SHARE_URL });
            return;
          } catch (err) {}
        }

        try {
          await navigator.clipboard.writeText(text);
          alert('Result copied to clipboard');
        } catch (err) {
          alert(text);
        }
      });
    }
  });
</script>
</body>
</html>
